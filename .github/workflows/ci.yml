name: Build and Test OpenPDAC-13

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo sh -c "wget -O - https://dl.openfoam.org/gpg.key | apt-key add -"
          sudo add-apt-repository http://dl.openfoam.org/ubuntu
          sudo apt-get update
          sudo apt-get -y install openfoam13 wget

      - name: Install Miniconda and create environment
        shell: bash
        run: |
          set -euo pipefail

          wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O miniconda.sh
          bash miniconda.sh -b -p "$HOME/miniconda"

          source "$HOME/miniconda/bin/activate"
          conda init bash
          conda env create -f environment.yml

      - name: Compile solver and utilities
        shell: bash
        run: |
          bash -ic '
            set -e
            set +m

            conda activate OpenPDACconda
            source /opt/openfoam13/etc/bashrc

            echo "Compiling OpenPDAC solver..."
            cd applications/OpenPDAC
            ./Allwmake

            cd ../utilities/topoGrid
            wmake
          '

      - name: Run test cases
        shell: bash
        env:
          CI: true
        run: |
          bash -ic '
            set -e
            set +m

            conda activate OpenPDACconda
            source /opt/openfoam13/etc/bashrc

            cd run
            chmod +x ./run-all-tests.sh
            ./run-all-tests.sh
          '
